<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field Log</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-soft: #1e293b;
      --muted: #94a3b8;
      --text: #f8fafc;
      --green: #22c55e;
      --gray: #334155;
      --blue: #38bdf8;
      --red: #ef4444;
      --border: #1f2937;
      --purple: #a78bfa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin: 18px 0 24px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: -0.04em;
    }

    .hero p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 15px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    }

    .section-title {
      font-weight: 700;
      margin: 18px 0 10px;
      font-size: 15px;
      color: #e2e8f0;
    }

    .hidden {
      display: none !important;
    }

    .lock-wrap {
      max-width: 420px;
      margin: 0 auto;
      text-align: center;
      padding: 18px 0;
    }

    .lock-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .lock-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 22px;
    }

    .pattern-grid {
      width: 260px;
      height: 260px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 22px;
      touch-action: none;
      user-select: none;
      position: relative;
    }

    .dot {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: #020617;
      border: 2px solid var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      cursor: pointer;
      transition: 0.12s ease;
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.02);
    }

    .dot::after {
      content: "";
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--muted);
      transition: 0.12s ease;
    }

    .dot.active {
      border-color: var(--purple);
      background: rgba(167,139,250,0.14);
      transform: scale(1.05);
    }

    .dot.active::after {
      background: var(--purple);
      box-shadow: 0 0 18px rgba(167,139,250,0.8);
    }

    .lock-status {
      margin-top: 18px;
      min-height: 42px;
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
    }

    .members {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    @media (min-width: 650px) {
      .members {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .member-card {
      border: 1px solid var(--gray);
      background: var(--card-soft);
      color: var(--text);
      border-radius: 18px;
      padding: 16px 10px;
      text-align: center;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
      user-select: none;
    }

    .member-card.selected {
      background: linear-gradient(135deg, #16a34a, var(--green));
      color: #052e16;
      border-color: #86efac;
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(34,197,94,0.25);
    }

    textarea {
      width: 100%;
      border: 1px solid var(--gray);
      background: #020617;
      color: var(--text);
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      outline: none;
      min-height: 170px;
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 16px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--blue);
      color: #082f49;
      width: 100%;
      font-size: 17px;
      padding: 15px 16px;
    }

    .btn-record {
      background: var(--green);
      color: #052e16;
      flex: 1;
    }

    .btn-stop {
      background: var(--red);
      color: white;
      flex: 1;
    }

    .btn-secondary {
      background: #334155;
      color: white;
      flex: 1;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 14px;
      background: #020617;
      color: var(--muted);
      font-size: 14px;
      white-space: pre-wrap;
      border: 1px solid var(--border);
    }

    .status.success {
      color: #bbf7d0;
      border-color: #166534;
      background: rgba(20,83,45,0.25);
    }

    .status.error {
      color: #fecaca;
      border-color: #991b1b;
      background: rgba(127,29,29,0.25);
    }

    audio {
      width: 100%;
      margin-top: 8px;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 14px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 7px;
      line-height: 1.45;
    }

    .recording-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--red);
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.25; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="lockView">
      <div class="hero">
        <h1>Field Log</h1>
        <p>Draw unlock pattern to continue.</p>
      </div>

      <div class="panel">
        <div class="lock-wrap">
          <div class="lock-title">Unlock</div>
          <div class="lock-subtitle">Draw the pattern.</div>

          <div id="patternGrid" class="pattern-grid">
            <div class="dot" data-dot="1"></div>
            <div class="dot" data-dot="2"></div>
            <div class="dot" data-dot="3"></div>
            <div class="dot" data-dot="4"></div>
            <div class="dot" data-dot="5"></div>
            <div class="dot" data-dot="6"></div>
            <div class="dot" data-dot="7"></div>
            <div class="dot" data-dot="8"></div>
            <div class="dot" data-dot="9"></div>
          </div>

          <div id="lockStatus" class="lock-status">Ready.</div>
        </div>
      </div>

      <div class="footer">Field Log</div>
    </div>

    <div id="appView" class="hidden">
      <div class="hero">
        <h1 id="projectTitle">Reports</h1>
        <p>Submit your daily report as text, audio, or both.</p>
      </div>

      <div class="panel">
        <div class="section-title">1. Choose your name</div>
        <div id="members" class="members"></div>

        <div class="section-title">2. Write your report</div>
        <textarea id="textReport" placeholder="Write what you worked on, progress, blockers, materials, costs, or next steps..."></textarea>
        <div class="hint">You can write text, record audio, or submit both together.</div>

        <div class="section-title">3. Or record audio</div>
        <div class="button-row">
          <button id="startBtn" class="btn-record" onclick="startRecording()">Start Recording</button>
          <button id="stopBtn" class="btn-stop" onclick="stopRecording()" disabled>Stop Recording</button>
          <button id="clearAudioBtn" class="btn-secondary" onclick="clearAudio()" disabled>Clear Audio</button>
        </div>

        <div id="recordingStatus" class="hint"></div>
        <audio id="audioPreview" controls class="hidden"></audio>

        <div class="section-title">4. Submit</div>
        <button id="submitBtn" class="btn-primary" onclick="submitReport()">Submit Report</button>

        <div id="status" class="status">Ready.</div>
      </div>

      <div class="footer">Field Log</div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDfHWz9rb-rP-InF9eZr_-Q_kvMeEPlJwBvQ7JRACHs97KZ-qwUE_enHuOpGfnbJq6/exec";

    let lockSessionId = "";
    let submitToken = "";
    let selectedMember = "";
    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let audioMimeType = "";

    let patternInput = [];
    let isPointerDown = false;
    let isVerifying = false;

    function setLockStatus(message) {
      document.getElementById("lockStatus").textContent = message;
    }

    function setStatus(message, type = "") {
      const el = document.getElementById("status");
      el.textContent = message;
      el.className = "status";
      if (type) el.classList.add(type);
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Math.random().toString(36).slice(2) + Date.now();

        window[callbackName] = function(data) {
          delete window[callbackName];
          script.remove();
          resolve(data);
        };

        const script = document.createElement("script");
        script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + encodeURIComponent(callbackName);
        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error("Network error"));
        };

        document.body.appendChild(script);
      });
    }

    async function verifyGesture(attempt) {
      if (isVerifying) return;
      isVerifying = true;

      try {
        const url =
          APPS_SCRIPT_URL +
          "?action=gesture" +
          "&attempt=" + encodeURIComponent(attempt) +
          "&lockSessionId=" + encodeURIComponent(lockSessionId || "");

        const result = await jsonp(url);

        if (result && result.lockSessionId) {
          lockSessionId = result.lockSessionId;
        }

        if (result && result.state === "unlocked" && result.submitToken) {
          submitToken = result.submitToken;
          buildApp(result.projectName || "Reports", result.members || []);
          showApp();
        } else {
          setLockStatus("Ready.");
        }
      } catch (err) {
        setLockStatus("Ready.");
      } finally {
        isVerifying = false;
      }
    }

    function resetPatternVisual() {
      patternInput = [];
      document.querySelectorAll(".dot").forEach(dot => {
        dot.classList.remove("active");
      });
    }

    function addDot(dotEl) {
      const value = dotEl.getAttribute("data-dot");
      if (!value) return;

      if (patternInput.includes(value)) return;

      patternInput.push(value);
      dotEl.classList.add("active");
    }

    function getDotFromPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      if (!el) return null;
      if (el.classList && el.classList.contains("dot")) return el;
      return null;
    }

    function finishPattern() {
      const attempt = patternInput.join("");

      setTimeout(() => {
        resetPatternVisual();
      }, 120);

      if (attempt.length > 0) {
        setLockStatus("Ready.");
        verifyGesture(attempt);
      }
    }

    function setupPatternLock() {
      const grid = document.getElementById("patternGrid");

      grid.addEventListener("pointerdown", event => {
        if (isVerifying) return;
        isPointerDown = true;
        resetPatternVisual();
        const dot = getDotFromPoint(event.clientX, event.clientY);
        if (dot) addDot(dot);
      });

      grid.addEventListener("pointermove", event => {
        if (!isPointerDown || isVerifying) return;
        const dot = getDotFromPoint(event.clientX, event.clientY);
        if (dot) addDot(dot);
      });

      window.addEventListener("pointerup", () => {
        if (!isPointerDown) return;
        isPointerDown = false;
        finishPattern();
      });

      document.querySelectorAll(".dot").forEach(dot => {
        dot.addEventListener("click", () => {
          if (isPointerDown || isVerifying) return;
          addDot(dot);

          if (patternInput.length >= 4) {
            finishPattern();
          }
        });
      });
    }

    function showApp() {
      document.getElementById("lockView").classList.add("hidden");
      document.getElementById("appView").classList.remove("hidden");
    }

    function buildApp(projectName, members) {
      document.getElementById("projectTitle").textContent = projectName + " Reports";

      const membersEl = document.getElementById("members");
      membersEl.innerHTML = "";

      members.forEach(name => {
        const card = document.createElement("div");
        card.className = "member-card";
        card.textContent = name;
        card.onclick = () => selectMember(name, card);
        membersEl.appendChild(card);
      });
    }

    function selectMember(name, card) {
      selectedMember = name;
      document.querySelectorAll(".member-card").forEach(el => el.classList.remove("selected"));
      card.classList.add("selected");
      setStatus("Selected: " + name);
    }

    function chooseBestMimeType() {
      const candidates = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/ogg;codecs=opus",
        "audio/ogg",
        "audio/mp4"
      ];

      for (const type of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
          return type;
        }
      }

      return "";
    }

    async function startRecording() {
      try {
        audioChunks = [];
        audioBlob = null;
        audioMimeType = "";

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("This browser does not support audio recording.", "error");
          return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const chosenType = chooseBestMimeType();
        const options = chosenType ? { mimeType: chosenType } : {};

        mediaRecorder = new MediaRecorder(stream, options);
        audioMimeType = mediaRecorder.mimeType || chosenType || "audio/webm";

        mediaRecorder.ondataavailable = event => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          audioBlob = new Blob(audioChunks, { type: audioMimeType });
          const audioUrl = URL.createObjectURL(audioBlob);

          const preview = document.getElementById("audioPreview");
          preview.src = audioUrl;
          preview.classList.remove("hidden");

          document.getElementById("clearAudioBtn").disabled = false;
          document.getElementById("recordingStatus").innerHTML =
            "Audio recorded. Format: " + audioMimeType;
        };

        mediaRecorder.start();

        document.getElementById("startBtn").disabled = true;
        document.getElementById("stopBtn").disabled = false;
        document.getElementById("recordingStatus").innerHTML =
          '<span class="recording-dot"></span>Recording...';
        setStatus("Recording audio...");
      } catch (err) {
        let help = "Microphone error: " + err.message + "\n\n";
        help += "Please allow microphone access for this page:\n";
        help += "1. Tap/click the lock or settings icon near the address bar.\n";
        help += "2. Open Site settings / Permissions.\n";
        help += "3. Set Microphone to Allow.\n";
        help += "4. Refresh and try again.";
        setStatus(help, "error");
      }
    }

    function stopRecording() {
      if (!mediaRecorder) return;

      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(track => track.stop());

      document.getElementById("startBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;
      setStatus("Audio recording stopped.");
    }

    function clearAudio() {
      audioBlob = null;
      audioChunks = [];
      audioMimeType = "";

      const preview = document.getElementById("audioPreview");
      preview.src = "";
      preview.classList.add("hidden");

      document.getElementById("clearAudioBtn").disabled = true;
      document.getElementById("recordingStatus").textContent = "";
      setStatus("Audio cleared.");
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        if (!blob) return resolve("");

        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function submitReport() {
      const submitBtn = document.getElementById("submitBtn");
      const textReport = document.getElementById("textReport").value.trim();

      if (!submitToken) {
        setStatus("Session expired. Refresh and unlock again.", "error");
        return;
      }

      if (!selectedMember) {
        setStatus("Please choose your name first.", "error");
        return;
      }

      if (!textReport && !audioBlob) {
        setStatus("Please write a report or record audio.", "error");
        return;
      }

      submitBtn.disabled = true;
      setStatus("Submitting report...");

      try {
        const audioDataUrl = await blobToDataUrl(audioBlob);

        const payload = {
          submitToken: submitToken,
          memberName: selectedMember,
          textReport: textReport,
          audioDataUrl: audioDataUrl,
          audioMimeType: audioMimeType
        };

        const formData = new FormData();
        formData.append("payload", JSON.stringify(payload));

        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          body: formData
        });

        setStatus(
          "Report submitted.\n\nCheck the inbox to confirm it arrived.",
          "success"
        );

        document.getElementById("textReport").value = "";
        clearAudio();
        submitBtn.disabled = false;

      } catch (err) {
        setStatus("Submit failed: " + err.message, "error");
        submitBtn.disabled = false;
      }
    }

    setupPatternLock();
  </script>
</body>
</html>
